<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库管理 · KL Agent</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-layout">

  <!-- Top Nav -->
  <nav class="top-nav">
    <div class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
      </svg>
      KL Agent
    </div>
    <a href="/" class="nav-link">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
      智能问答
    </a>
    <a href="/admin" class="nav-link active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      知识库管理
    </a>
  </nav>

  <!-- Main -->
  <div class="main-content">
    <div class="admin-layout">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <div class="page-title">知识库管理</div>
          <div class="page-subtitle">管理知识库文档，支持上传、查看、删除操作</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">文档总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-chunks">—</div>
          <div class="stat-label">知识分块</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">✓</div>
          <div class="stat-label">向量索引</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">✓</div>
          <div class="stat-label">BM25 索引</div>
        </div>
      </div>

      <!-- Upload Card -->
      <div class="upload-card">
        <div class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
          上传文档
        </div>
        <div class="drop-zone" id="drop-zone">
          <div class="drop-zone-icon">📄</div>
          <div class="drop-zone-text"><strong>点击选择文件</strong> 或拖拽文件到此处</div>
          <div class="drop-zone-hint">支持 PDF、DOCX、TXT、MD · 单文件最大 50MB</div>
        </div>
        <input type="file" id="file-input" accept=".pdf,.docx,.txt,.md">
        <div class="upload-progress" id="upload-progress">
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar" style="width:0%"></div>
          </div>
          <div class="progress-text" id="progress-text"></div>
        </div>
      </div>

      <!-- Document Table -->
      <div class="table-card">
        <div class="table-toolbar">
          <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" id="search-input" placeholder="搜索文档名称…">
          </div>
          <div class="table-actions-right">
            <button class="btn btn-outline" onclick="loadDocuments()" style="font-size:13px;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              刷新
            </button>
          </div>
        </div>

        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>文件名</th>
                <th>类型</th>
                <th>大小</th>
                <th>分块数</th>
                <th>上传时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="doc-tbody">
              <tr><td colspan="6" class="table-empty">
                <div class="loading-spinner" style="margin:0 auto;"></div>
              </td></tr>
            </tbody>
          </table>
        </div>

        <div class="table-footer">
          <span id="table-info" class="text-muted"></span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">文档详情</div>
      <button class="modal-close" onclick="closeModal('detail-modal')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('detail-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveDescription()">保存备注</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" style="color:var(--danger);">确认删除</div>
      <button class="modal-close" onclick="closeModal('delete-modal')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:12px;">确定要删除文档 <strong id="delete-file-name"></strong> 吗？</p>
      <p style="color:var(--text-muted);font-size:13px;">此操作将同时删除文件、向量索引及所有分块，<strong>不可恢复</strong>。</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('delete-modal')">取消</button>
      <button class="btn btn-danger" id="confirm-delete-btn" onclick="executeDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/admin.js"></script>
</body>
</html>
