<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库问答 · KL Agent</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-layout">

  <!-- Top Nav -->
  <nav class="top-nav">
    <div class="nav-brand">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
      </svg>
      KL Agent
    </div>
    <a href="/" class="nav-link active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
      智能问答
    </a>
    <a href="/admin" class="nav-link">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      知识库管理
    </a>
  </nav>

  <!-- Main -->
  <div class="main-content">
    <div class="chat-layout">

      <!-- Sidebar -->
      <aside class="chat-sidebar">
        <button class="new-chat-btn" onclick="newChat()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          新建对话
        </button>
        <div class="sidebar-title">支持的内容</div>
        <div style="padding:8px;font-size:13px;color:var(--text-muted);line-height:1.8;">
          <div>📄 文本问答</div>
          <div>🖼️ 图片理解</div>
          <div>🎬 视频分析</div>
          <div>📚 知识库检索</div>
          <div>🔍 混合语义检索</div>
        </div>
        <div class="sidebar-title" style="margin-top:8px;">使用提示</div>
        <div style="padding:8px;font-size:12px;color:var(--text-muted);line-height:1.8;">
          按 Enter 发送，<br>Shift+Enter 换行。<br>可附带图片进行<br>视觉问答。
        </div>
      </aside>

      <!-- Chat Area -->
      <div class="chat-area">
        <div class="messages-container" id="messages-container">

          <!-- Welcome Screen -->
          <div class="welcome-screen" id="welcome-screen">
            <div class="welcome-icon">🤖</div>
            <div class="welcome-title">你好！我是知识库助手</div>
            <div class="welcome-subtitle">基于企业私有知识库，为你提供准确、可溯源的智能问答服务。支持文字、图片多模态输入。</div>
            <div class="quick-prompts">
              <button class="quick-prompt">年假政策是什么？</button>
              <button class="quick-prompt">员工手册主要包含哪些内容？</button>
              <button class="quick-prompt">加班如何申请？</button>
              <button class="quick-prompt">试用期相关规定</button>
            </div>
          </div>

        </div>

        <!-- Input Area -->
        <div class="input-area">
          <div class="input-attachments" id="input-attachments"></div>
          <div class="input-box">
            <textarea
              id="question-input"
              placeholder="输入问题…（支持图片附件进行视觉问答）"
              rows="1"
            ></textarea>
            <div class="input-actions">
              <button class="icon-btn" id="attach-image-btn" title="附加图片">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </button>
              <button class="icon-btn" id="attach-video-btn" title="附加视频">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.868v6.264a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
              </button>
              <button class="send-btn" id="send-btn" title="发送 (Enter)">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="input-hint">KL Agent 可能会犯错，重要信息请核实。</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="image-input" accept="image/*" style="display:none;">
<input type="file" id="video-input" accept="video/*" style="display:none;">

<script src="/static/js/api.js"></script>
<script src="/static/js/chat.js"></script>
</body>
</html>
